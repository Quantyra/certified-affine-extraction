name: Lean audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lean:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build audited Lean target
        run: lake build PvNP.TseitinCNFData

      - name: Check axiom audit surface
        run: lake env lean lean/PvNP/Audit.lean
